name: Fetch Telegram Messages

on:
  workflow_dispatch:
    inputs:
      force_full_fetch:
        description: 'Force full fetch (ignore last_sync)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install telethon cryptography python-dotenv

      - name: Set session string env
        run: echo "TG_SESSION_STRING=${{ secrets.TG_SESSION_STRING }}" >> $GITHUB_ENV

      - name: Run fetch script
        env:
          TG_API_ID:     ${{ secrets.TG_API_ID }}
          TG_API_HASH:   ${{ secrets.TG_API_HASH }}
          DATA_KEY:      ${{ secrets.DATA_ENCRYPTION_KEY }}
          FORCE_FULL:    ${{ github.event.inputs.force_full_fetch || 'false' }}
          DEFAULT_FETCH_COUNT: '20'
          DEFAULT_UPDATE_COUNT: '50'
        run: python src/fetch_messages.py

      - name: Export plain JSON for Pages
        env:
          DATA_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
        run: python src/export_json.py

      - name: Commit updated data
        run: |
          git config user.name  "tg-relay[bot]"
          git config user.email "tg-relay[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: sync messages [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"
          git push
